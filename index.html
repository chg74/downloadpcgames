<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تحميل الألعاب</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:#0f172a;
padding:20px;
}

.title{
text-align:center;
color:white;
font-size:35px;
margin-bottom:30px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:.3s;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h2{
color:white;
padding:15px;
text-align:center;
font-size:20px;
}
</style>

</head>
<body>

<h1 class="title">🎮 تحميل الألعاب</h1>

<div class="games" id="games"></div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyAUc2cH9gVE7RECiW19XQXJNZQxVH96sFE",
authDomain:"zezo-59a8d.firebaseapp.com",
databaseURL:"https://zezo-59a8d-default-rtdb.firebaseio.com",
projectId:"zezo-59a8d"
});

const db = firebase.database();

const games = document.getElementById("games");

db.ref("games").on("value",snap=>{

games.innerHTML="";

snap.forEach(item=>{

let data=item.val();

games.innerHTML+=`
<div class="card"
onclick="window.open('${data.link}')">

<img src="${data.image}">

<h2>${data.name}</h2>

</div>
`;

});

});

</script>

</body>
</html>
